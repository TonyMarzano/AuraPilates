<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fondo círculo verde bosque -->
  <circle cx="32" cy="32" r="32" fill="#2d3d2c"/>
  <!-- Anillo ornamental -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#8aab85" stroke-width="0.8" opacity="0.7"/>
  <!-- Anillo interior punteado -->
  <circle cx="32" cy="32" r="23" fill="none" stroke="#b5c9b1" stroke-width="0.6" stroke-dasharray="2,3" opacity="0.5"/>
  <!-- Puntos cardinales -->
  <circle cx="32" cy="4"  r="1.5" fill="#b5c9b1" opacity="0.8"/>
  <circle cx="32" cy="60" r="1.5" fill="#b5c9b1" opacity="0.8"/>
  <circle cx="4"  cy="32" r="1.5" fill="#b5c9b1" opacity="0.8"/>
  <circle cx="60" cy="32" r="1.5" fill="#b5c9b1" opacity="0.8"/>
  <!-- Letras CP en serif italic -->
  <text
    x="32" y="43"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28"
    font-style="italic"
    font-weight="300"
    fill="#d4e5d0"
    letter-spacing="-1"
  ><tspan fill="#b5c9b1">C</tspan>P</text>
</svg>
